<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支出入力</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 24px 16px; }
    h1 { font-size: 20px; color: #333; margin-bottom: 24px; text-align: center; }
    .card { background: #fff; border-radius: 12px; padding: 24px; max-width: 480px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    input:focus, select:focus { outline: none; border-color: #06C755; }
    .btn { width: 100%; padding: 14px; background: #06C755; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn:active { background: #05a847; }
    .msg { margin-top: 16px; text-align: center; font-size: 14px; color: #333; display: none; }
    .msg.success { color: #06C755; }
    .msg.error { color: #e00; }
  </style>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1>💰 支出入力</h1>
  <div class="card">
    <div class="form-group">
      <label>日付</label>
      <input type="date" id="date">
    </div>
    <div class="form-group">
      <label>内容</label>
      <input type="text" id="content" placeholder="例）ランチ">
    </div>
    <div class="form-group">
      <label>種別</label>
      <select id="category">
        <option value="">選択してください</option>
      </select>
    </div>
    <div class="form-group">
      <label>金額（円）</label>
      <input type="number" id="amount" placeholder="例）1200">
    </div>
    <button class="btn" onclick="submitForm()">送信</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const LIFF_ID = '2009421302-l5gRRxsT';
    const CATEGORIES = ['食費', '本', 'サッカー', '服', 'コンビニ', '優衣', 'その他'];

    liff.init({ liffId: LIFF_ID }).then(() => {
      initializeApp();
    }).catch(err => {
      showMsg('LIFF初期化に失敗しました: ' + err, 'error');
    });

    function initializeApp() {
      // 今日の日付をセット
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;

      // 種別をセット
      const sel = document.getElementById('category');
      CATEGORIES.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        sel.appendChild(opt);
      });
    }

    function submitForm() {
      const date = document.getElementById('date').value.replace(/-/g, '/');
      const content = document.getElementById('content').value.trim();
      const category = document.getElementById('category').value;
      const amount = document.getElementById('amount').value;

      if (!date || !content || !category || !amount) {
        showMsg('すべての項目を入力してください。', 'error');
        return;
      }

      // LINEアプリ内でない場合はエラー表示
      if (!liff.isInClient()) {
        showMsg('LINEアプリ内で開いてください。', 'error');
        return;
      }

      const btn = document.querySelector('.btn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      const msg = `${date}\n${content}\n${category}\n${amount}`;

      liff.sendMessages([{ type: 'text', text: msg }]).then(() => {
        liff.closeWindow();
      }).catch(err => {
        btn.disabled = false;
        btn.textContent = '送信';
        showMsg('送信に失敗しました。LINEアプリから開き直してください。\n' + err, 'error');
      });
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = `msg ${type}`;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
