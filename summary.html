<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支出確認</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 24px 16px; }
    h1 { font-size: 20px; color: #333; margin-bottom: 24px; text-align: center; }
    .card { background: #fff; border-radius: 12px; padding: 24px; max-width: 480px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
    select, input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    select:focus, input:focus { outline: none; border-color: #06C755; }
    .btn { width: 100%; padding: 14px; background: #06C755; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn:active { background: #05a847; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .msg { margin-top: 16px; text-align: center; font-size: 14px; color: #333; display: none; }
    .msg.error { color: #e00; }
    .note { margin-top: 16px; font-size: 13px; color: #888; text-align: center; }
  </style>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1>📊 支出確認</h1>
  <div class="card">
    <div class="form-group">
      <label>期間</label>
      <select id="period">
        <option value="current">今月</option>
        <option value="select">月を選択</option>
        <option value="all">全体</option>
      </select>
    </div>
    <div class="form-group" id="month-group" style="display:none;">
      <label>月を選択</label>
      <input type="month" id="month">
    </div>
    <button class="btn" id="btn" onclick="submitSummary()">確認する</button>
    <div class="msg" id="msg"></div>
    <p class="note">結果はLINEトークに送信されます</p>
  </div>

  <script>
    const LIFF_ID = '2009421302-TZA5q7Do';

    liff.init({ liffId: LIFF_ID }).then(() => {
      // 今月をデフォルトセット
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      document.getElementById('month').value = `${yyyy}-${mm}`;
    }).catch(err => {
      showMsg('LIFF初期化に失敗しました: ' + err, 'error');
    });

    // 月選択の表示切り替え
    document.getElementById('period').addEventListener('change', function () {
      document.getElementById('month-group').style.display = this.value === 'select' ? 'block' : 'none';
    });

    function submitSummary() {
      if (!liff.isInClient()) {
        showMsg('LINEアプリ内で開いてください。', 'error');
        return;
      }

      const period = document.getElementById('period').value;
      let periodText;

      if (period === 'current') {
        periodText = '今月';
      } else if (period === 'select') {
        const val = document.getElementById('month').value;
        if (!val) { showMsg('月を選択してください。', 'error'); return; }
        periodText = val.replace('-', '/'); // YYYY/MM
      } else {
        periodText = '全体';
      }

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      liff.sendMessages([{ type: 'text', text: `サマリー\n${periodText}` }]).then(() => {
        liff.closeWindow();
      }).catch(err => {
        btn.disabled = false;
        btn.textContent = '確認する';
        showMsg('送信に失敗しました。LINEアプリから開き直してください。\n' + err, 'error');
      });
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = `msg ${type || ''}`;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
